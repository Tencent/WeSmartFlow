repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  # 前端 prettier（远端 mirror）
  # 注意：CSS/SCSS/LESS 交给 stylelint 管理，避免与 prettier 格式化规则冲突（如 leading-zero）
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/.*\.(vue|js|jsx|ts|tsx|md|json|yaml|yml)$

  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        language: node
        pass_filenames: true
        files: ^frontend/.*\.(js|jsx|ts|tsx|vue)$
        entry: eslint
        args: [--fix, -c, frontend/eslint.config.js]
        additional_dependencies:
          - eslint@10.2.1
          - "@eslint/js@10.0.1"
          - eslint-plugin-vue@10.8.0
          - vue-eslint-parser@9.4.3
          - globals@17.5.0
          - typescript-eslint@8.59.0

      - id: stylelint-css
        name: stylelint (css only)
        language: node
        files: ^frontend/.*\.css$
        entry: npx
        args: [stylelint, --fix, --config, frontend/stylelint.config.cjs]
        additional_dependencies:
          - stylelint@16
          - stylelint-config-standard@36
          - "@stylistic/stylelint-plugin@3"

  # 后端 ruff（远端）
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        files: ^backend/.*\.py$
        args: [--fix]
      - id: ruff-format
        files: ^backend/.*\.py$
